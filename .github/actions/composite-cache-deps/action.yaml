name: Cache Node and NPM Dependencies
description: This action allows to cache both Node and NPM dependencies based on the package-lock.json file.

inputs:
  node-version:
    description: NodeJS version to use
    required: true
    default: 24.x
  working-dir:
    description: The working directory of the application
    required: false
    default: .
  target-env:
    description: '"dev" or "prod". Controls whether dev deps are installed'
    default: dev
    required: false

runs:
  using: composite
  steps:
    - name: Setup NodeJS Version ${{ inputs.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
    - name: Cache Dependencies
      uses: actions/cache@v6
      id: cache
      with:
        path: ${{ inputs.working-dir }}/node_modules
        key: node-modules-${{ inputs.target-env }}-${{ hashFiles(format('{0}/{1}', inputs.working-dir, 'package-lock.json'))}}
    - name: Install dependencies (dev)
      if: ${{ steps.cache.outputs.cache-hit != 'true' &&  inputs.target-env == 'dev'}}
      shell: bash
      run: npm ci
      working-directory: ${{ inputs.working-dir}}
    - name: Install dependencies (prod)
      if: ${{ steps.cache.outputs.cache-hit != 'true' &&  inputs.target-env != 'dev'}}
      shell: bash
      run: npm ci--omit=dev
      working-directory: ${{ inputs.working-dir}}

    #/ The 2 ifs can also be used in a single step like:
    # - name: Install dependencies
    #   if: ${{ steps.cache.outputs.cache-hit != 'true' }}
    #   shell: bash
    #   run: #{{ inputs.target-env == 'prod' && 'npm ci' || 'npm ci --omit=dev'}}