name: 04 - Using Actions

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
       - name: Checkout code
         uses: actions/checkout@v7
       - name: Setup Node
         uses: actions/setup-node@v6
         with:
            node-version: 24.x
       - name: Install dependencies
         run: npm ci
         working-directory: 04-using-actions/react-app
       - name: Run Unit Tests
         run: npm run test
         working-directory: 04-using-actions/react-app