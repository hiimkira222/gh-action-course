name: 08 - Using Variables

on:
    push:
    workflow_dispatch:

env:
    WORKFLOW_VAR: "I am workflow env var"
    OVERWRITTEN: "I will be overwritten"
    UNDEFINED_VAR_WITH_DEFAULT: "${{ vars.UNDEFINED_VAR || 'default value'}}"

jobs:
    echo:
        runs-on: ubuntu-latest
        env:
            JOB_VAR: "I am job env var"
            OVERWRITTEN: "I have been overwritten at job level"
        steps:
            - name: Print Env variables.
              env:
                STEP_VAR: "I am step env var"
                step_var2: "I am another step env var"
              run: |
                echo "Step env var: $STEP_VAR"
                echo "Step env var2: $step_var2"
                echo "Job env var: $JOB_VAR"
                echo "Workflow env var: $WORKFLOW_VAR"
                echo "Overwritten env var: $OVERWRITTEN"
            - name: Overwrite Job Variable
              env:
                OVERWRITTEN: "I have been overwritten at step level"
              run: |
                echo "Step env var: $OVERWRITTEN"
    echo-2:
        runs-on: ubuntu-latest
        steps:
            - name: Print variables
              run: |
                echo "Repo var: ${{ vars.REPOSITORY_VAR }}"
    echo-3:
        runs-on: ubuntu-latest
        environment: staging
        steps:
            - name: Print Prod Variables
              run: |
                echo "Org overwritten var: ${{ vars.OVERWRITTEN_VAR}}"
                echo "Repo var: ${{ vars.repository_var }}"
                echo "Envirnment var: ${{ vars.TARGET_VAR}}"
    echo-undefined:
        runs-on: ubuntu-latest
        steps:
            - name: Print Undefined Variable
              run: |
                echo "Org var: ${{ env.UNDEFINED_VAR_WITH_DEFAULT }}"
