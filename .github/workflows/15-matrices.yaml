name: 15 - Working with matrices

on:
    workflow_dispatch:

jobs:
    backwards-compatibility:
        name: ${{ matrix.os }}-${{ matrix.node-version }}
        strategy:
            matrix:
                node-version: [24.x, 26.x]
                os:
                    - ubuntu-latest
                    - windows-latest
                include:
                    - os: ubuntu-latest
                      node-version: 26.x
                      tag: experimental
                    - os: ubuntu-latest
                      node-version: 20.x
            fail-fast: false

        runs-on: ${{ matrix.os }}

        steps:
            - name: Setup Node
              uses: actions/setup-node@v6
              with: 
                node-version: ${{ matrix.node-version }}

            - name: Fail if experimental
              if: matrix.tag == 'experimental'
              run: exit 1

            - name: Perform some tests
              run: |
                echo "Running tests on OS ${{ matrix.os }} and NodeJS ${{ matrix.node-version }}"
                sleep 10 
              
            - name: Upload test results
              run: echo "Uploading test results..."

    include-example:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                colors: [red, green]
                shape: [circle, square]
                size: [small, large]
                include:
                  - opacity: 50
                  - colors: red
                    opacity: 75
                  - shape: circle
                    opacity: 100
                  - colors: red
                    shape: triangle
                  - colors: green
                    shape: circle
                    size: medium
                exclude:
                  - colors: green
                    shape: circle


        name: ${{ matrix.colors }}-${{ matrix.shape }}-${{ matrix.size }}-${{ matrix.opacity }}
        steps:
            - name: Dummy step
              run: echo ${{ matrix.colors }}-${{ matrix.shape }}-${{ matrix.size }}-${{ matrix.opacity }}
