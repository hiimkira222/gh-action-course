name: 09 - Functions

on:
    workflow_dispatch:

jobs:
    echo1:
        runs-on: ubuntu-latest
        steps:
            - name: Print PR title
              run: echo "PR title is ${{ github.event.pull_request.title }}"
            - name: Print PR labels
              run: | 
                  cat << E0F
                  echo "PR labels are ${{ toJSON(github.event.pull_request.labels) }}"
            - name: Bug step
              if: ${{ success() && contains(github.event.pull_request.title, 'fix') }}
              run: echo "I am a bug fix"
            - name: Sleep for 20 seconds
              run: sleep 20
            - name: Failing step
              run: |
                  echo "I will fail"
                  exit 1
            - name: I will be skipped
              if: ${{ success()}}
              run: echo "I will print if previous step was successful"
            - name: I will execute
              if: ${{ failure() }}
              run: echo "I will print if any of the previous steps failed"
            - name: I will execute
              if: ${{ !cancelled()}}
              run: echo "I will always print, except when the workflow is cancelled"
            - name: I will execute when cancelled
              if: ${{ cancelled()}}
              run: echo "I will print if the workflow is cancelled"
