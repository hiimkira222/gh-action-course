name: Working with Outputs

on:
    workflow_dispatch:
        inputs:
            build-status:
                type: choice
                options: 
                    - success
                    - failure
                default: success

jobs:
    build:
        outputs: 
            build-status: ${{ steps.buid.outputs.status }}
        runs-on: ubuntu-latest
        steps:
            - name: Print GITHUB_OUTPUT path
              run: echo "$GITHUB_OUTPUT"
            - name: Build
              id: build
              run: echo "status=${{ inputs.build-status }}" >> "$GITHUB_OUTPUT"
    deploy:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: deploy
              if: ${{ needs.build.outputs.build-status == 'success' }}
              run: echo "Deploying"