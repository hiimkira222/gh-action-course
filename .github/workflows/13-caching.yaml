name: 13 - Using caching

on:
    workflow_dispatch:
        inputs:
            use-cache:
                type: boolean
                default: true
                description: Whether to execute cache step
            node-version:
                type: choice
                options:
                    - '24.x'
                    - '26.x'
                default: '24.x'
                description: Node version

jobs:

    install-deps:
        runs-on: ubuntu-latest
        outputs:
            deps-cache-key: ${{ steps.cache_key.outputs.CACHE_KEY }}
        defaults:
            run: 
                working-directory: 13-caching/template
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                node-version: ${{ inputs.node-version }}
            
            - name: Calculate cache key
              id: cache_key
              run:
                echo "CACHE_KEY=deps-node-modules-${{ hashFiles('13-caching/template/package-lock.json')}}" >> $"GITHUB_OUTPUTS"

            - name: Download cache dependencies
              uses: actions/cache@v6
              with:
                path: 13-caching/template/node_modules
                key: ${{ steps.cache_key.outputs.deps-cache-key }}

    build:
        runs-on: ubuntu-latest
        needs: install-deps
        defaults:
            run:
                working-directory: 13-caching/template
        
        steps:
            - name: Checkout Code
              uses: actions/checkout@v7

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                node-version: ${{ inputs.node-version }}

            - name: Download cached dependencies
              uses: actions/cache@v6
              id: cache
              with:
                path: 13-caching/template/node_modules
                key: ${{ needs.install-deps.outputs.deps-cache-key }}

            - name: Testing
              run: npm run build

            - name: Deploying to nonprod
              run: echo "Deploying to nonprod"

    linting:
        runs-on: ubuntu-latest
        needs: install-deps
        defaults:
            run:
                working-directory: 13-caching/template
        steps:
            - name: Checkout Code
              uses: actions/checkout@v7

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                node-version: ${{ inputs.node-version }}

            - name: Download cached dependencies
              id: cache2
              uses: actions/cache@v6
              with:
                path: 13-caching/template/node_modules
                key: ${{ needs.install-deps.outputs.deps-cache-key }}

            - name: Testing
              run: npm run test

            - name: Linting
              run: echo "Liniting..."


