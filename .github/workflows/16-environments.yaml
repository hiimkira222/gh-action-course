name: 16 - Working with Environments 

on:
    workflow_dispatch:

jobs:
    deploy_staging:
      runs-on: ubuntu-latest
      environment: staging
      env:
        my-env-value: ${{ vars.MY_ENV_VALUE || 'default value' }}
      steps:
        - name: Echo vars
          run: |
            echo "Deploy to staging"
    
    E2E-Tests:
        runs-on: ubuntu-latest
        needs: deploy_staging
        steps:
            - name: E2E Tests
              run: echo "Running E2E tests"

    deploy-frontend:
        runs-on: ubuntu-latest
        needs: E2E-Tests
        environment: prod
        env:
            my-env-value: ${{ vars.MY_ENV_VALUE || 'default value'}}
        steps:
            - name: Echo vars
              run: echo "Deploying to frontend"

    deploy-backend1:
        runs-on: ubuntu-latest
        needs: E2E-Tests
        environment: prod
        env:
            my-env-value: ${{ vars.MY_ENV_VALUE || 'default value'}}
        steps:
            - name: Echo vars
              run: echo "Deploying to backend1"

    deploy-backend2:
        runs-on: ubuntu-latest
        needs: E2E-Tests
        environment: prod
        env:
            my-env-value: ${{ vars.MY_ENV_VALUE || 'default value'}}
        steps:
            - name: Echo vars
              run: echo "Deploying to backend2"