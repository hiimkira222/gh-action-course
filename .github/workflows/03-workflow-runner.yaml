name: 03 - Workflow Runner

on: push

jobs:
  ubuntu-echo:
    runs-on: ubuntu-latest
    steps:
      - name: Show OS
        run: echo "I am running on ${{ runner.os }}" 
  windows-echo:
        runs-on: windows-latest
        steps:
            - name: Show OS
              run: echo "I am running on ${{ runner.os }}"
  mac-echo:
        runs-on: macos-latest
        steps:
            - name: Show OS
              shell: bash
              run: echo "I am running on ${{ runner.os }}"